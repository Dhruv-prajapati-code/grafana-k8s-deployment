apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: devops
data:
  default.conf: |
    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            sub_filter 'http://localhost:5000' '';
            sub_filter_once off;
        }

        location /tasks {
            proxy_pass http://backend:5000/tasks;
        }
    }
