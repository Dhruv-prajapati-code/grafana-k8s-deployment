apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: devops
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
       - name: postgres-cont
         image: postgres:15
         ports:
         - containerPort: 5432
         env:
         - name: POSTGRES_DB
           value: tasksdb
         - name: POSTGRES_USER
           value: postgres
         - name: POSTGRES_PASSWORD
           value: postgres
         volumeMounts:
           - name: postgres-initdb
             mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-initdb
          configMap:
            name: postgres-initdb
